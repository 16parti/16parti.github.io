		function wertyu(dict) {
			var txt = ""
			var input = message.value;
			for (let i = 0; i < input.length; ++i) {
				let c = input.charAt(i);
				txt += dict.hasOwnProperty(c) ? dict[c] : c;
			}
			message.value = txt;
		}

		<header>
			<h1>Wertyu Translator</h1>
		</header>
		<main>
			<textarea id="message" rows="4" cols="50" placeholder="Put message here"></textarea>
		</main>
		<footer>
			<button onclick="wertyu(dictDec)">Decode Message</button>
			<button onclick="wertyu(dictEnc)">Encode Message</button>
		</footer>
